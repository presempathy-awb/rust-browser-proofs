# agents.toml - single source of truth for browser-proof assistant instructions.

[meta]
project = "silopal-pagedb-browser-proofs"
canonical_reference = """
silopal-pagedb-browser-proofs = the browser test harness + durability oracle
for pagedb's OPFS storage backend. The backend implementation itself lives in the pagedb fork
at ~/code/pres/vendor/pagedb (branch feat/opfs-sync-backend), developed here
and PR'd upstream to github.com/NodeDB-Lab/pagedb. The reference upstream
checkout at ~/src/lodefolio/data/databases/pagedb is pristine - never edit it.
PRD: docs/prd/2026-07-02-pagedb-opfs-adapter.md. Plan: docs/plans/.
"""

[vcs]
notes = """
This repository is consumed as the `browser-proofs` Git submodule by
silopal-pagedb-opfs. The vendor pagedb fork stays plain git (upstream PR
discipline); its remotes: origin = NodeDB-Lab GitHub (PR target, never push),
gitea = user's fork mirror (push allowed).
"""

[testing]
notes = """
Browser suites run via `just test-chrome` / `just test-firefox` (wasm-pack,
headless, dedicated worker - OPFS sync access handles exist nowhere else).
Native-side tests via `just test-native`. Every browser test must isolate its
OPFS namespace (unique subdirectory) and clean up - origin state persists
across tests in one browser session.
"""
