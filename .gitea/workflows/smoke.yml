# rust-browser-proofs PageDB suite smoke - Gitea Actions (modeled on telpher-smoke.yml).
#
# Scope: fmt + clippy + native tests + generic-consumer and PageDB wasm32 checks.
# The browser suites (wasm-pack test --headless) run LOCALLY via `just
# test-browsers` - the runner has no Chrome/Firefox.
#
# The pagedb dependency is a PRIVATE git dep on this Gitea instance, so the
# runner needs the PAGEDB_DEPLOY_KEY secret: a read-only deploy key for
# awb/pagedb (Settings -> Deploy keys). Without it the build fails at fetch.
name: rust-browser-proofs PageDB suite smoke

on: [push, workflow_dispatch]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate PageDB dependency credential
        env:
          PAGEDB_DEPLOY_KEY: ${{ secrets.PAGEDB_DEPLOY_KEY }}
        run: |
          set -eu
          if [ -z "$PAGEDB_DEPLOY_KEY" ]; then
            echo "::error::PAGEDB_DEPLOY_KEY is required to fetch private awb/pagedb. Add a read-only deploy key as this repository's Actions secret."
            exit 1
          fi
      - name: SSH for private pagedb dep
        env:
          PAGEDB_DEPLOY_KEY: ${{ secrets.PAGEDB_DEPLOY_KEY }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$PAGEDB_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keyscan -p 22 gitea >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::Unable to reach the internal Gitea SSH service from this Actions runner."
            exit 1
          fi
          cat >> ~/.ssh/config <<'EOF'
          Host gitea
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          git config --global url."ssh://git@gitea:22/".insteadOf \
            "ssh://git@git.telpher.stream:2222/"
      - name: Install Rust 1.95 + wasm target
        run: |
          set -eu
          command -v rustup >/dev/null 2>&1 || {
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          }
          . "$HOME/.cargo/env" 2>/dev/null || true
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95
          rustup component add rustfmt clippy
          rustup target add wasm32-unknown-unknown
      - name: fmt + clippy + native tests + wasm checks
        run: |
          set -eu
          . "$HOME/.cargo/env" 2>/dev/null || true
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          cargo run -p rust-browser-proofs --features runner -- -- cargo check -p rust-browser-proofs-consumer-fixture --target wasm32-unknown-unknown --tests
          cargo check -p pagedb-opfs-harness --target wasm32-unknown-unknown
