# lefthook - git hooks (installed via `just setup` -> `lefthook install`)
rc: .lefthookrc

pre-commit:
  commands:
    fmt-check:
      run: mise exec -- just fmt-check
    security-source:
      run: mise exec -- just security-source

pre-push:
  commands:
    verify:
      run: mise exec -- just verify
    container-verify:
      run: mise exec -- just container-verify
