# lefthook - git hooks (installed via `just setup` -> `lefthook install`)
rc: .lefthookrc

pre-commit:
  commands:
    fmt-check:
      run: just fmt-check
    security-source:
      run: just security-source

pre-push:
  commands:
    verify:
      run: just verify
    container-verify:
      run: just container-verify
